<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appliance-Module Association</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fff;
      margin: 0;
      padding: 0;
    }
    .container {
      width: 100%;
      max-width: none;
      margin: 0;
      background: none;
      border-radius: 0;
      border: none;
      padding: 0;
      box-shadow: none;
    }
    h2 {
      text-align: center;
      margin-bottom: 18px;
      font-size: 1.2rem;
      color: #213343;
    }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 18px;
      min-height: 480px;
    }
    .modules-panel, .unifiers-panel {
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #f7fafd;
      padding: 18px;
      min-height: 420px;
      display: flex;
      flex-direction: column;
    }
    .modules-panel {
      min-width: 180px;
      max-width: 260px;
    }
    .modules-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
    }
    .module-btn {
      background: #fff;
      border: 1px solid #888;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.15s, border 0.15s;
    }
    .module-btn:hover {
      background: #e5f5f8;
      border-color: #00a4bd;
    }
    .unifiers-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1;
    }
    .unifier-card {
      background: #fff;
      border: 1px solid #bbb;
      border-radius: 8px;
      padding: 14px 18px 12px 18px;
      margin-bottom: 6px;
      min-width: 220px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .unifier-title {
      font-weight: 700;
      font-size: 1.08rem;
      margin-bottom: 4px;
      color: #213343;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #00a4bd;
      display: inline-block;
    }
    .status-dot.new { background: #bbb; }
    .status-dot.active { background: #00a4bd; }
    .status-label {
      font-size: 0.98rem;
      color: #555;
    }
    .modules-in-appliance {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 6px;
    }
    .module-in-appliance {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #eaf1fa;
      border: 1px solid #d3dae6;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.98rem;
      justify-content: space-between;
    }
    .remove-btn {
      background: #f8c6e6;
      border: none;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      color: #a00a5c;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.15s;
    }
    .remove-btn:hover {
      background: #e66a4a;
      color: #fff;
    }
    .add-module-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .add-module-btn {
      background: #eaf1fa;
      border: 1px solid #d3dae6;
      border-radius: 8px;
      color: #213343;
      font-size: 1.05rem;
      font-weight: 500;
      padding: 7px 16px;
      cursor: pointer;
      transition: background 0.15s, border 0.15s;
      box-shadow: none;
    }
    .add-module-btn:hover {
      background: #dbe7f3;
      border-color: #bfc9d9;
    }
    .submit-row {
      display: flex;
      justify-content: center;
      margin: 28px 0 18px 0;
    }
    .submit-btn {
      background: rgb(255, 122, 89);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 12px 44px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(62,196,109,0.08);
      transition: background 0.15s;
    }
    .submit-btn:hover {
      background: rgb(227, 106, 76);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Initial step: Deal type selection and modules overview -->
    <div id="dealStepContainer">
      <form id="dealTypeForm" style="max-width:400px;margin:32px auto 0 auto;padding:24px 28px 18px 28px;border:1px solid #bbb;border-radius:8px;background:#f7fafd;">
        <h2 style="margin-bottom:18px;">CONFIGURE NEW ASSOCIATION</h2>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <label><input type="radio" name="dealType" value="New Deal"> New Deal</label>
          <label><input type="radio" name="dealType" value="Cross Sale"> Cross Sell</label>
          <label><input type="radio" name="dealType" value="Renewal"> Renewal + Up sell</label>
          <label><input type="radio" name="dealType" value="Up Sale"> Up Sell</label>
        </div>
        <div style="text-align:center;margin-top:24px;">
          <button id="continueBtn" type="button" style="background:#0078d4;color:#fff;border:none;border-radius:4px;padding:10px 36px;font-size:1.05rem;font-weight:600;cursor:pointer;opacity:0.5;transition:opacity 0.2s;" disabled>Continue</button>
        </div>
      </form>
      <div id="modulesPreview" style="max-width:900px;margin:32px auto 0 auto;padding:0 18px 18px 18px;">
        <h3 style="font-size:1.08rem;color:#213343;margin-bottom:10px;">ASSOCIATION OVERVIEW</h3>
        <div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:18px 18px 0 18px;">
          <table style="width:100%;border-collapse:collapse;">
            <thead>
              <tr style="background:#f7fafd;">
                <th style="text-align:left;padding:8px 6px;font-size:0.98rem;color:#213343;border-bottom:1px solid #e0e0e0;">Appliance name</th>
                <th style="text-align:left;padding:8px 6px;font-size:0.98rem;color:#213343;border-bottom:1px solid #e0e0e0;">Associated modules</th>
                <th style="text-align:left;padding:8px 6px;font-size:0.98rem;color:#213343;border-bottom:1px solid #e0e0e0;">Deal type</th>
                <th style="text-align:left;padding:8px 6px;font-size:0.98rem;color:#213343;border-bottom:1px solid #e0e0e0;">Status</th>
              </tr>
            </thead>
            <tbody id="modulesPreviewBody">
              <!-- Rows will be rendered by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <!-- Main content hidden until selection -->
    <div id="mainContent" style="display:none;">
      <div class="main-grid">
        <div class="modules-panel">
          <div><strong>Modules from Current Deal</strong></div>
          <div class="modules-list" id="availableModules">
            <!-- Modules not assigned to any appliance will appear here -->
          </div>
        </div>
        <div class="appliances-panel">
          <div class="appliances-list" id="appliancesList">
            <!-- Appliance cards will be rendered here -->
          </div>
        </div>
      </div>
      <div class="submit-row" style="gap: 18px;">
        <button class="submit-btn" onclick="handleSubmit()">Submit</button>
        <button class="submit-btn" style="background:#bbb; color:#213343;" onclick="handleBack(event)">Back</button>
      </div>
    </div>
  </div>
  <script>
    // Initial data
    const modules = [
      { id: 1, name: 'Module 1' },
      { id: 2, name: 'Module 2' },
      { id: 3, name: 'Module 3' },
      { id: 4, name: 'Module 4' },
      { id: 5, name: 'Module 5' },
      { id: 6, name: 'Module 6' }
    ];
    const appliances = [
      { id: 'A', name: 'Appliance A', status: 'Active', modules: [1,2], dealType: 'Cross Sell' },
      { id: 'B', name: 'Appliance B', status: 'Active', modules: [3,4], dealType: 'Up Sell' },
      { id: 'C', name: 'Appliance C', status: 'New', modules: [], dealType: null },
      { id: 'D', name: 'Appliance D', status: 'New', modules: [], dealType: null }
    ];
    // Track pre-existing modules in Up Sell deals
    let preexistingModulesByAppliance = {};
    
    // Save original appliances state for preview table
    const originalAppliances = JSON.parse(JSON.stringify(appliances));
    // Working copy for main content area
    let workingAppliances = JSON.parse(JSON.stringify(appliances));

    function getUnassignedModules() {
      const assigned = new Set(workingAppliances.flatMap(a => a.modules));
      return modules.filter(m => !assigned.has(m.id));
    }

    function renderModulesList() {
      const available = getUnassignedModules();
      const container = document.getElementById('availableModules');
      container.innerHTML = '';
      if (available.length === 0) {
        container.innerHTML = '<div style="color:#888; margin-top:12px;">All modules assigned</div>';
        return;
      }
      available.forEach(m => {
        const btn = document.createElement('button');
        btn.className = 'module-btn';
        btn.textContent = m.name;
        btn.onclick = () => showAddModuleMenu(m.id);
        container.appendChild(btn);
      });
    }

    function renderAppliances() {
      const container = document.getElementById('appliancesList');
      container.innerHTML = '';
      // Check if we are in Up Sell deal
      const dealType = document.querySelector('input[name="dealType"]:checked')?.value;
      workingAppliances.forEach(a => {
        const card = document.createElement('div');
        card.className = 'appliance-card';
        card.setAttribute('data-appliance-id', a.id);
        // Title
        const title = document.createElement('div');
        title.className = 'appliance-title';
        title.textContent = a.name;
        card.appendChild(title);
        // Status
        const statusRow = document.createElement('div');
        statusRow.className = 'status-row';
        const dot = document.createElement('span');
        dot.className = 'status-dot ' + (a.status.toLowerCase());
        statusRow.appendChild(dot);
        const statusLabel = document.createElement('span');
        statusLabel.className = 'status-label';
        statusLabel.textContent = 'Status: ' + a.status;
        statusRow.appendChild(statusLabel);
        card.appendChild(statusRow);
        // Modules in appliance
        const modList = document.createElement('div');
        modList.className = 'modules-in-appliance';
        a.modules.forEach(mid => {
          const m = modules.find(mm => mm.id === mid);
          if (!m) return;
          const row = document.createElement('div');
          row.className = 'module-in-appliance';
          
          // Check if module is pre-existing in Renewal deal
          let isPreexisting = false;
          if ((dealType === 'Up Sale' || dealType === 'Renewal') && preexistingModulesByAppliance[a.id] && preexistingModulesByAppliance[a.id].includes(mid)) {
            isPreexisting = true;
          }
          
          // Create module name with label for Renewal deal
          const nameSpan = document.createElement('span');
          nameSpan.textContent = m.name;
          row.appendChild(nameSpan);
          
          // Add label only for Renewal deals
          if (dealType === 'Renewal') {
            const label = document.createElement('span');
            if (isPreexisting) {
              label.textContent = 'Renewal';
              label.style.background = '#e8f5e9';
              label.style.color = '#2e7d32';
            } else {
              label.textContent = 'New';
              label.style.background = '#fff3e0';
              label.style.color = '#e65100';
            }
            label.style.padding = '2px 8px';
            label.style.borderRadius = '4px';
            label.style.fontSize = '0.85rem';
            label.style.fontWeight = '600';
            label.style.marginLeft = '8px';
            row.appendChild(label);
          }
          
          if (!isPreexisting) {
            // Remove button only if not pre-existing
            const rmBtn = document.createElement('button');
            rmBtn.className = 'remove-btn';
            rmBtn.textContent = '×';
            rmBtn.onclick = () => removeModuleFromAppliance(a.id, m.id);
            row.appendChild(rmBtn);
          }
          modList.appendChild(row);
        });
        card.appendChild(modList);
        
        // Add "Do not renew" button only for Renewal deals on active appliances
        if (dealType === 'Renewal' && a.status === 'Active' && preexistingModulesByAppliance[a.id] && preexistingModulesByAppliance[a.id].length > 0) {
          const doNotRenewBtn = document.createElement('button');
          doNotRenewBtn.textContent = 'Do not renew';
          doNotRenewBtn.style.background = '#ffebee';
          doNotRenewBtn.style.color = '#c62828';
          doNotRenewBtn.style.border = '1px solid #ef5350';
          doNotRenewBtn.style.borderRadius = '6px';
          doNotRenewBtn.style.padding = '8px 16px';
          doNotRenewBtn.style.fontSize = '0.95rem';
          doNotRenewBtn.style.fontWeight = '600';
          doNotRenewBtn.style.cursor = 'pointer';
          doNotRenewBtn.style.marginBottom = '8px';
          doNotRenewBtn.style.transition = 'background 0.15s, border 0.15s';
          doNotRenewBtn.onmouseover = () => {
            doNotRenewBtn.style.background = '#ffcdd2';
          };
          doNotRenewBtn.onmouseout = () => {
            doNotRenewBtn.style.background = '#ffebee';
          };
          doNotRenewBtn.onclick = () => {
            // Get pre-existing modules (Renewal) to remove completely
            const preexistingModules = preexistingModulesByAppliance[a.id] || [];
            
            // Remove pre-existing modules from the global modules list
            preexistingModules.forEach(mid => {
              const moduleIndex = modules.findIndex(m => m.id === mid);
              if (moduleIndex > -1) {
                modules.splice(moduleIndex, 1);
              }
            });
            
            // Remove the appliance completely from the list
            const applianceIndex = workingAppliances.findIndex(app => app.id === a.id);
            if (applianceIndex > -1) {
              workingAppliances.splice(applianceIndex, 1);
            }
            
            renderAll();
          };
          card.appendChild(doNotRenewBtn);
        }
        
        // Add module button
        const addRow = document.createElement('div');
        addRow.className = 'add-module-row';
        const addBtn = document.createElement('button');
        addBtn.className = 'add-module-btn';
        addBtn.textContent = 'Add module ＋';
        addBtn.onclick = () => showAddModuleMenu(null, a.id);
        addRow.appendChild(addBtn);
        card.appendChild(addRow);
        // Alert if no modules associated
        if (a.modules.length === 0) {
          const alertDiv = document.createElement('div');
          alertDiv.style.color = '#a00a5c';
          alertDiv.style.background = '#fff3f6';
          alertDiv.style.border = '1px solid #f8c6e6';
          alertDiv.style.borderRadius = '6px';
          alertDiv.style.padding = '8px 12px';
          alertDiv.style.marginTop = '8px';
          alertDiv.textContent = 'No modules associated. Please add one.';
          card.appendChild(alertDiv);
        }
        container.appendChild(card);
      });
    }

    // Render a select dropdown for assigning a module to an appliance
    function showAddModuleMenu(moduleId = null, applianceId = null) {
      // Remove any previous select menus
      document.querySelectorAll('.assign-select-row').forEach(e => e.remove());
      // If moduleId is provided, show a select to pick an appliance
      if (moduleId !== null) {
        const container = document.getElementById('availableModules');
        const selectRow = document.createElement('div');
        selectRow.className = 'assign-select-row';
        selectRow.style.margin = '8px 0';
        const select = document.createElement('select');
        select.style.padding = '7px 12px';
        select.style.borderRadius = '6px';
        select.style.border = '1px solid #bbb';
        select.style.fontSize = '1rem';
        select.innerHTML = '<option value="">Assign to appliance</option>' +
          originalAppliances.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        select.onchange = function() {
          if (select.value) {
            const a = workingAppliances.find(a => a.id === select.value);
            if (a) {
              a.modules.push(moduleId);
              renderAll();
            }
          }
        };
        selectRow.appendChild(select);
        container.appendChild(selectRow);
        select.focus();
        return;
      }
      // If applianceId is provided, show a select to pick a module
      if (applianceId !== null) {
        const available = getUnassignedModules();
        const card = document.querySelector(`.appliance-card[data-appliance-id="${applianceId}"]`);
        if (!card) return;
        const selectRow = document.createElement('div');
        selectRow.className = 'assign-select-row';
        selectRow.style.margin = '8px 0';
        const select = document.createElement('select');
        select.style.padding = '7px 12px';
        select.style.borderRadius = '6px';
        select.style.border = '1px solid #bbb';
        select.style.fontSize = '1rem';
        select.innerHTML = '<option value="">Add module</option>' +
          available.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        select.onchange = function() {
          if (select.value) {
            const m = available.find(m => m.id == select.value);
            const a = workingAppliances.find(a => a.id === applianceId);
            if (m && a) {
              a.modules.push(m.id);
              renderAll();
            }
          }
        };
        selectRow.appendChild(select);
        card.appendChild(selectRow);
        select.focus();
      }
    }

    function removeModuleFromAppliance(applianceId, moduleId) {
      const a = workingAppliances.find(a => a.id === applianceId);
      if (!a) return;
      a.modules = a.modules.filter(mid => mid !== moduleId);
      renderAll();
    }

    function handleBack(e) {
      e.preventDefault();
      workingAppliances = JSON.parse(JSON.stringify(originalAppliances));
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('dealStepContainer').style.display = '';
      renderModulesPreview();
    }

    function handleSubmit() {
      // Validate that all modules are assigned and all appliances have at least one module
      const unassignedModules = getUnassignedModules();
      const appliancesWithoutModules = workingAppliances.filter(a => a.modules.length === 0);
      
      if (unassignedModules.length > 0) {
        alert('Please assign all modules before submitting.');
        return;
      }
      
      if (appliancesWithoutModules.length > 0) {
        alert('All appliances must have at least one module before submitting.');
        return;
      }
      
      // If validation passes, return to initial screen
      workingAppliances = JSON.parse(JSON.stringify(originalAppliances));
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('dealStepContainer').style.display = '';
      renderModulesPreview();
    }

    function renderAll() {
      renderModulesList();
      renderAppliances();
    }

    // Show main screen only when continue button is clicked
    function showMainContent() {
      document.getElementById('dealStepContainer').style.display = 'none';
      document.getElementById('mainContent').style.display = '';
      renderAll();
    }

    // Render the modules preview table
    function renderModulesPreview() {
      const tbody = document.getElementById('modulesPreviewBody');
      tbody.innerHTML = '';
      // Display appliances and their associated modules
      appliances.forEach(appliance => {
        const modulesNames = appliance.modules.map(mid => {
          const m = modules.find(mm => mm.id === mid);
          return m ? m.name : '';
        }).filter(Boolean).join(', ') || '<span style="color:#888">None</span>';
        // Status: configured if it has modules, pending if not
        const status = appliance.modules.length > 0
          ? '<span style="background:#eafbe7;color:#1a7f37;padding:2px 10px;border-radius:6px;font-weight:600;">configured</span>'
          : '<span style="background:#fffbe7;color:#b88b00;padding:2px 10px;border-radius:6px;font-weight:600;">pending</span>';
        // Deal type with styled label
        let dealTypeLabel = '-';
        let dealTypeStyle = 'color:#888;';
        
        // Use appliance's individual dealType if set, otherwise use form selection
        const dealType = appliance.dealType || document.querySelector('input[name="dealType"]:checked')?.value;
        
        if (dealType === 'New Deal') {
          dealTypeLabel = 'New Deal';
          dealTypeStyle = 'background:#e3f2fd;color:#1565c0;padding:2px 10px;border-radius:6px;font-weight:600;';
        } else if (dealType === 'Cross Sell' || dealType === 'Cross Sale') {
          dealTypeLabel = 'Cross Sell';
          dealTypeStyle = 'background:#f3e5f5;color:#6a1b9a;padding:2px 10px;border-radius:6px;font-weight:600;';
        } else if (dealType === 'Renewal') {
          dealTypeLabel = 'Renewal';
          dealTypeStyle = 'background:#e8f5e9;color:#2e7d32;padding:2px 10px;border-radius:6px;font-weight:600;';
        } else if (dealType === 'Up Sell' || dealType === 'Up Sale') {
          dealTypeLabel = 'Up Sell';
          dealTypeStyle = 'background:#fff3e0;color:#e65100;padding:2px 10px;border-radius:6px;font-weight:600;';
        }
        
        const dealTypeHtml = dealTypeLabel !== '-' 
          ? `<span style="${dealTypeStyle}">${dealTypeLabel}</span>`
          : '-';
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="padding:8px 6px;border-bottom:1px solid #f0f0f0;">${appliance.name}</td>
          <td style="padding:8px 6px;border-bottom:1px solid #f0f0f0;">${modulesNames}</td>
          <td style="padding:8px 6px;border-bottom:1px solid #f0f0f0;">${dealTypeHtml}</td>
          <td style="padding:8px 6px;border-bottom:1px solid #f0f0f0;">${status}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    // Mostrar tabla de modules preview siempre
    renderModulesPreview();

    // Habilitar el botón continuar solo si se selecciona un tipo de deal
    const continueBtn = document.getElementById('continueBtn');
    document.querySelectorAll('input[name="dealType"]').forEach(radio => {
      radio.addEventListener('change', function() {
        continueBtn.disabled = false;
        continueBtn.style.opacity = '1';
      });
    });

    continueBtn.addEventListener('click', function() {
      const selectedDeal = document.querySelector('input[name="dealType"]:checked')?.value;
      // Reset working appliances to original state
      workingAppliances = JSON.parse(JSON.stringify(originalAppliances));
      
      if (selectedDeal === 'New Deal' || selectedDeal === 'Cross Sale') {
        // Clear all modules assigned and set all appliances as 'New'
        workingAppliances.forEach(a => {
          a.modules = [];
          a.status = 'New';
        });
        preexistingModulesByAppliance = {};
      } else if (selectedDeal === 'Up Sale' || selectedDeal === 'Renewal') {
        // Example: pre-assign some modules to the first appliances, leaving others available
        workingAppliances.forEach((a, idx) => {
          if (idx === 0) {
            a.modules = [modules[0].id, modules[1].id];
            a.status = 'Active';
          } else if (idx === 1) {
            a.modules = [modules[2].id];
            a.status = 'Active';
          } else {
            a.modules = [];
            a.status = 'New';
          }
        });
        // Save snapshot of pre-existing
        preexistingModulesByAppliance = {};
        workingAppliances.forEach(a => {
          preexistingModulesByAppliance[a.id] = [...a.modules];
        });
      } else {
        preexistingModulesByAppliance = {};
      }
      showMainContent();
    });
  </script>
</body>
</html>
